<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>GOLONG MEDICAL · 高浪预防医学</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300&family=Noto+Serif+SC:wght@300;400;500;600&display=swap');

  :root{
    --bg:#FAF8F5; --bg-card:#FFFFFF;
    --text:#1A1A1A; --text-2:#6B6560; --text-3:#A8A29B;
    --accent:#8B7355; --accent-2:#C4AD8F; --accent-soft:#F2ECE2;
    --border:#E8E4DF; --border-2:#F0ECE7;
    --gold:#C9A96E; --green:#4A7C59; --green-soft:#EEF4EF;
    --blue:#5B7B9A; --amber:#B08742;
    --shadow:0 1px 3px rgba(0,0,0,.04);
    --shadow-2:0 6px 28px rgba(60,50,40,.10);
    --serif:'Cormorant Garamond','Noto Serif SC',Georgia,serif;
    --sans:-apple-system,'SF Pro Text','Helvetica Neue',sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:var(--sans);background:#E9E4DD;color:var(--text);-webkit-font-smoothing:antialiased;min-height:100vh;padding:36px 0;}
  .desktop{width:min(1180px,calc(100vw - 48px));margin:0 auto;display:grid;grid-template-columns:390px minmax(360px,1fr);gap:44px;align-items:start;}

  /* ---------- phone shell ---------- */
  .phone{width:390px;height:844px;background:var(--bg);border-radius:46px;box-shadow:0 0 0 12px #1b1b1b,0 0 0 14px #3a3a3a,0 40px 90px rgba(0,0,0,.34);overflow:hidden;position:relative;transform:translateZ(0);}
  .notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:124px;height:33px;background:#1b1b1b;border-radius:0 0 20px 20px;z-index:1500;}
  .home-bar{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);width:134px;height:5px;background:rgba(20,20,20,.75);border-radius:3px;z-index:1500;pointer-events:none;}
  #screen{position:absolute;inset:0;overflow:hidden;}

  /* ---------- view transitions ---------- */
  .view{position:absolute;inset:0;display:flex;flex-direction:column;background:var(--bg);
        transition:transform .42s cubic-bezier(.32,.72,0,1),opacity .42s;will-change:transform;}
  .view.from-right{transform:translateX(100%);}
  .view.from-left{transform:translateX(-26%);opacity:.55;}
  .view.to-left{transform:translateX(-26%);opacity:.55;}
  .view.to-right{transform:translateX(100%);}
  .view.fade{opacity:0;}
  .scroll{flex:1 1 auto;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
  .scroll::-webkit-scrollbar{display:none;}

  /* ---------- status / nav ---------- */
  .statusbar{flex:none;height:52px;display:flex;align-items:flex-end;justify-content:space-between;padding:0 26px 7px;font-size:14px;font-weight:600;}
  .statusbar .si{display:flex;gap:6px;align-items:center;font-size:11px;font-weight:500;}
  .navbar{flex:none;display:flex;align-items:center;justify-content:space-between;padding:6px 14px 12px;}
  .nav-btn{width:38px;height:38px;display:flex;align-items:center;justify-content:center;font-size:20px;color:var(--text);background:none;border:none;cursor:pointer;}
  .nav-ttl{font-family:var(--serif);font-size:17px;font-weight:500;letter-spacing:.5px;}
  .nav-sub{font-size:11px;color:var(--text-3);text-align:center;margin-top:1px;letter-spacing:1px;}

  /* ---------- tab bar ---------- */
  .tabbar{flex:none;height:80px;background:rgba(255,255,255,.94);backdrop-filter:blur(20px);border-top:1px solid var(--border-2);display:flex;justify-content:space-around;padding-top:9px;}
  .tab{display:flex;flex-direction:column;align-items:center;gap:4px;background:none;border:none;cursor:pointer;color:var(--text-3);font-size:10px;letter-spacing:.5px;transition:color .2s;}
  .tab.on{color:var(--accent);}
  .tab svg{width:22px;height:22px;}

  /* ---------- bottom action bar ---------- */
  .actionbar{flex:none;background:rgba(255,255,255,.97);backdrop-filter:blur(20px);border-top:1px solid var(--border-2);padding:13px 22px 28px;display:flex;align-items:center;gap:11px;}
  .ab-price{flex:1;}
  .ab-price .l{font-size:10px;color:var(--text-3);letter-spacing:.4px;line-height:1.35;max-width:150px;}
  .ab-price .v{font-family:var(--serif);font-size:22px;color:var(--accent);line-height:1.1;}
  .btn{border:none;cursor:pointer;border-radius:2px;letter-spacing:1px;font-family:var(--sans);transition:.18s;}
  .btn-line{padding:13px 18px;font-size:13px;border:1px solid var(--text);background:transparent;color:var(--text);}
  .btn-line:active{background:var(--text);color:#fff;}
  .btn-fill{padding:14px 26px;font-size:13px;background:var(--text);color:#fff;}
  .btn-fill:active{background:#3a3a3a;}
  .btn-fill.wide,.btn-line.wide{flex:1;text-align:center;}
  .btn-fill[disabled]{background:var(--border);color:var(--text-3);cursor:default;}

  /* ---------- home ---------- */
  .hero{position:relative;height:420px;}
  .hero .bg{width:100%;height:100%;object-fit:cover;}
  .hero .ov{position:absolute;inset:0;background:linear-gradient(to top,var(--bg) 4%,rgba(250,248,245,.1) 42%,transparent 70%);}
  .hero .ct{position:absolute;left:24px;right:24px;bottom:30px;}
  .eyebrow{font-family:var(--serif);font-size:11px;letter-spacing:4px;text-transform:uppercase;color:var(--accent);margin-bottom:12px;}
  .hero h1{font-family:var(--serif);font-size:33px;font-weight:300;line-height:1.18;letter-spacing:-.5px;margin-bottom:9px;}
  .hero p{font-size:13px;color:var(--text-2);line-height:1.6;}

  .sec-h{display:flex;justify-content:space-between;align-items:baseline;padding:30px 24px 15px;}
  .sec-t{font-family:var(--serif);font-size:21px;font-weight:500;}
  .sec-m{font-size:12px;color:var(--accent);cursor:pointer;letter-spacing:.5px;}

  .rscroll{display:flex;gap:13px;padding:0 24px 8px;overflow-x:auto;scrollbar-width:none;}
  .rscroll::-webkit-scrollbar{display:none;}
  .rcard{flex:0 0 138px;height:182px;border-radius:5px;overflow:hidden;position:relative;cursor:pointer;transition:transform .18s;}
  .rcard:active{transform:scale(.97);}
  .rcard .bg{width:100%;height:100%;}
  .rcard .ov{position:absolute;inset:0;background:linear-gradient(to top,rgba(20,15,10,.62),transparent 58%);}
  .rcard .ct{position:absolute;left:14px;bottom:14px;color:#fff;}
  .rcard .fl{font-size:21px;margin-bottom:5px;}
  .rcard .nm{font-family:var(--serif);font-size:17px;letter-spacing:.5px;}
  .rcard .cn{font-size:11px;opacity:.82;margin-top:2px;}
  .rcard .soon{position:absolute;top:10px;right:10px;font-size:9px;letter-spacing:1px;background:rgba(255,255,255,.9);color:var(--accent);padding:2px 7px;border-radius:2px;}

  .fcard{margin:0 24px 15px;background:var(--bg-card);border-radius:5px;overflow:hidden;box-shadow:var(--shadow);cursor:pointer;transition:box-shadow .3s,transform .18s;}
  .fcard:active{box-shadow:var(--shadow-2);transform:translateY(-1px);}
  .fcard .img{width:100%;height:188px;}
  .fcard .bd{padding:18px 20px 20px;}
  .ftag{display:inline-block;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--accent);border:1px solid var(--accent-2);padding:3px 10px;border-radius:2px;margin-bottom:12px;}
  .fcard .nm{font-family:var(--serif);font-size:20px;font-weight:500;line-height:1.3;margin-bottom:8px;}
  .fcard .ds{font-size:13px;color:var(--text-2);line-height:1.65;margin-bottom:13px;}
  .fmeta{display:flex;gap:15px;font-size:11px;color:var(--text-3);}

  .bgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:11px;padding:0 24px 14px;}
  .bitem{aspect-ratio:1.15;background:var(--bg-card);border:1px solid var(--border-2);border-radius:5px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:7px;cursor:pointer;transition:.2s;}
  .bitem:active{border-color:var(--accent-2);box-shadow:var(--shadow-2);}
  .blogo{font-family:var(--serif);font-size:19px;font-weight:600;letter-spacing:2px;}
  .blogo-ph{width:34px;height:34px;border-radius:6px;background:#E4E0D9;color:var(--text-3);display:flex;align-items:center;justify-content:center;font-size:9px;letter-spacing:1px;font-weight:600;}
  .bsub{font-size:9px;color:var(--text-3);letter-spacing:1.5px;}

  .hgrid{display:grid;grid-template-columns:1fr 1fr;gap:13px;padding:0 24px 8px;}
  .hgcard{background:var(--bg-card);border-radius:5px;overflow:hidden;box-shadow:var(--shadow);cursor:pointer;transition:box-shadow .3s,transform .18s;}
  .hgcard:active{box-shadow:var(--shadow-2);transform:translateY(-1px);}
  .hgcard .img{width:100%;height:96px;}
  .hgcard .bd{padding:12px 13px 14px;}
  .hgcard .nm{font-family:var(--serif);font-size:14px;font-weight:500;line-height:1.3;margin-bottom:4px;}
  .hgcard .rg{font-size:11px;color:var(--text-2);display:flex;align-items:center;gap:4px;}

  /* ---------- region / hospital list ---------- */
  .rband{height:150px;position:relative;margin-bottom:6px;}
  .rband .bg{width:100%;height:100%;}
  .rband .ov{position:absolute;inset:0;background:linear-gradient(to top,var(--bg),transparent 70%);}
  .rband .ct{position:absolute;left:24px;bottom:14px;}
  .rband .fl{font-size:26px;}
  .rband h2{font-family:var(--serif);font-size:26px;font-weight:300;margin-top:2px;}
  .rband .cn{font-size:12px;color:var(--text-2);margin-top:2px;}

  .list{padding:0 24px;}
  .litem{display:flex;align-items:center;gap:15px;padding:18px 0;border-bottom:1px solid var(--border-2);cursor:pointer;}
  .litem:active{opacity:.65;}
  .lico{width:52px;height:52px;border-radius:50%;background:var(--bg-card);border:1px solid var(--border-2);display:flex;align-items:center;justify-content:center;font-size:24px;flex:none;}
  .linfo{flex:1;min-width:0;}
  .lname{font-family:var(--serif);font-size:17px;font-weight:500;margin-bottom:3px;}
  .ldet{font-size:12px;color:var(--text-2);}
  .lbrand{display:inline-block;font-size:10px;color:var(--accent);background:var(--accent-soft);padding:2px 8px;border-radius:2px;margin-top:5px;letter-spacing:.5px;}
  .larr{color:var(--text-3);font-size:16px;}
  .lrate{font-family:var(--serif);font-size:15px;color:var(--accent);}

  /* ---------- filters ---------- */
  .filters{flex:none;display:flex;gap:8px;padding:2px 24px 14px;overflow-x:auto;scrollbar-width:none;}
  .filters::-webkit-scrollbar{display:none;}
  .chip{flex:0 0 auto;padding:7px 16px;font-size:12px;border:1px solid var(--border);border-radius:20px;background:transparent;color:var(--text-2);cursor:pointer;transition:.2s;white-space:nowrap;}
  .chip.on{background:var(--text);color:#fff;border-color:var(--text);}

  /* ---------- project card ---------- */
  .pcard{margin:0 24px 18px;background:var(--bg-card);border-radius:5px;overflow:hidden;box-shadow:var(--shadow);cursor:pointer;transition:box-shadow .3s,transform .18s;}
  .pcard:active{box-shadow:var(--shadow-2);transform:translateY(-1px);}
  .pcard .img{width:100%;height:150px;position:relative;}
  .pcard .free-rib{position:absolute;top:12px;left:0;background:var(--green);color:#fff;font-size:11px;letter-spacing:1px;padding:4px 12px 4px 14px;border-radius:0 2px 2px 0;}
  .pcard .bd{padding:15px 17px;}
  .pcard .row{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:7px;gap:10px;}
  .pcard .nm{font-family:var(--serif);font-size:17px;font-weight:500;line-height:1.25;}
  .pcard .pr{font-family:var(--serif);font-size:17px;color:var(--accent);white-space:nowrap;}
  .pcard .pr .freeword{color:var(--green);}
  .pcard .hp{font-size:12px;color:var(--text-2);margin-bottom:10px;}
  .ptags{display:flex;gap:6px;flex-wrap:wrap;}
  .ptag{font-size:10px;color:var(--text-3);border:1px solid var(--border);padding:2px 8px;border-radius:2px;}
  .empty{text-align:center;color:var(--text-3);font-size:13px;padding:60px 24px;}

  /* ---------- detail ---------- */
  .dhero{height:296px;position:relative;flex:none;}
  .dhero .img{width:100%;height:100%;}
  .dround{position:fixed;top:50px;width:38px;height:38px;background:rgba(255,255,255,.9);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;border:none;z-index:1200;}
  .dback{left:16px;}.dfav{right:16px;font-size:16px;}
  .dcontent{padding:24px;}
  .dbadge{display:inline-flex;align-items:center;gap:6px;background:linear-gradient(135deg,#f5f0e8,#ebe3d5);padding:6px 13px;border-radius:2px;font-size:11px;color:var(--accent);letter-spacing:1.5px;margin-bottom:15px;}
  .dtitle{font-family:var(--serif);font-size:27px;font-weight:300;line-height:1.25;margin-bottom:9px;}
  .dhosp{font-size:13px;color:var(--text-2);display:flex;align-items:center;gap:6px;margin-bottom:20px;}
  .dprice{display:flex;align-items:baseline;gap:11px;flex-wrap:wrap;padding-bottom:22px;margin-bottom:22px;border-bottom:1px solid var(--border-2);}
  .dprice .big{font-family:var(--serif);font-size:28px;color:var(--accent);}
  .dprice .big.free{color:var(--green);}
  .dprice .ori{font-size:14px;color:var(--text-3);text-decoration:line-through;}
  .dprice .note{font-size:11px;color:var(--green);background:var(--green-soft);padding:3px 10px;border-radius:2px;}
  .dsec{margin-bottom:24px;}
  .dsec-t{font-family:var(--serif);font-size:16px;font-weight:600;letter-spacing:.5px;margin-bottom:11px;}
  .dsec p{font-size:13px;color:var(--text-2);line-height:1.85;white-space:pre-line;}
  .dgrid{display:grid;grid-template-columns:1fr 1fr;gap:11px;}
  .dgi{background:var(--bg);border:1px solid var(--border-2);padding:13px;border-radius:4px;}
  .dgi .l{font-size:10px;color:var(--text-3);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;}
  .dgi .v{font-family:var(--serif);font-size:15px;font-weight:500;line-height:1.42;overflow-wrap:anywhere;}
  .ddoc{display:flex;align-items:center;gap:14px;padding:15px;background:var(--bg);border-radius:4px;}
  .ddoc .av{width:48px;height:48px;border-radius:50%;background:var(--accent-2);display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:18px;color:#fff;flex:none;}
  .ddoc .n{font-family:var(--serif);font-size:15px;font-weight:500;margin-bottom:3px;}
  .ddoc .t{font-size:12px;color:var(--text-2);}
  .dlist{list-style:none;}
  .dlist li{font-size:13px;color:var(--text-2);line-height:1.9;padding-left:16px;position:relative;}
  .dlist li::before{content:'';position:absolute;left:0;top:11px;width:4px;height:4px;border-radius:50%;background:var(--accent-2);}

  /* ---------- booking ---------- */
  .steps{flex:none;display:flex;align-items:center;justify-content:center;padding:4px 24px 18px;}
  .step{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--text-3);}
  .step.on{color:var(--text);}.step.done{color:var(--green);}
  .snum{width:24px;height:24px;border-radius:50%;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;transition:.2s;}
  .step.on .snum{background:var(--text);color:#fff;border-color:var(--text);}
  .step.done .snum{background:var(--green);color:#fff;border-color:var(--green);}
  .sline{width:30px;height:1px;background:var(--border);margin:0 5px;}
  .bform{padding:0 24px 16px;}
  .fg{margin-bottom:22px;}
  .flabel{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--text-2);margin-bottom:10px;display:block;}
  .finput{width:100%;padding:13px 15px;font-size:14px;border:1px solid var(--border);border-radius:2px;background:var(--bg-card);font-family:var(--sans);color:var(--text);outline:none;transition:border-color .2s;}
  .finput:focus{border-color:var(--accent);}
  .finput::placeholder{color:var(--text-3);}
  .finput.err{border-color:#c0564a;}
  .ferr{font-size:11px;color:#c0564a;margin-top:6px;}
  .fselect{appearance:none;background-image:url("data:image/svg+xml,%3Csvg width='12' height='8' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1.5L6 6.5L11 1.5' stroke='%23A8A29B' stroke-width='1.5' fill='none'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 15px center;padding-right:38px;}
  .calhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
  .calhead .mo{font-family:var(--serif);font-size:16px;}
  .calhead .nav{color:var(--text-3);font-size:13px;letter-spacing:6px;}
  .cal{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
  .cw{text-align:center;font-size:10px;color:var(--text-3);padding:7px 0;letter-spacing:1px;}
  .cd{aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:13px;border-radius:50%;cursor:pointer;color:var(--text-2);transition:.15s;}
  .cd:active{background:var(--border-2);}
  .cd.dis{color:var(--border);pointer-events:none;}
  .cd.full{color:var(--text-3);pointer-events:none;text-decoration:line-through;opacity:.5;}
  .cd.sel{background:var(--text);color:#fff;}
  .times{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
  .ts{padding:12px;text-align:center;font-size:13px;border:1px solid var(--border);border-radius:2px;cursor:pointer;color:var(--text-2);transition:.15s;}
  .ts:active{border-color:var(--accent);}
  .ts.sel{background:var(--text);color:#fff;border-color:var(--text);}
  .ts.dis{color:var(--border);pointer-events:none;}
  .fnote{display:flex;align-items:flex-start;gap:9px;padding:14px;background:var(--accent-soft);border-radius:4px;font-size:12px;color:var(--text-2);line-height:1.6;margin-top:6px;}
  .fnote .i{font-size:15px;flex:none;margin-top:1px;}
  .rev{background:var(--bg-card);border:1px solid var(--border-2);border-radius:5px;overflow:hidden;margin-bottom:16px;}
  .rev-h{padding:15px 18px;border-bottom:1px solid var(--border-2);font-family:var(--serif);font-size:13px;letter-spacing:2px;color:var(--text-2);}
  .rev-b{padding:8px 18px 14px;}
  .rrow{display:flex;justify-content:space-between;padding:9px 0;font-size:13px;}
  .rrow .l{color:var(--text-3);}.rrow .v{color:var(--text);text-align:right;max-width:62%;}
  .rdiv{height:1px;background:var(--border-2);margin:6px 0;}

  /* ---------- confirm ---------- */
  .csuccess{text-align:center;padding:64px 40px 28px;}
  .ccheck{width:64px;height:64px;border-radius:50%;background:var(--green);display:flex;align-items:center;justify-content:center;margin:0 auto 22px;font-size:28px;color:#fff;animation:pop .4s cubic-bezier(.2,1.4,.5,1);}
  @keyframes pop{0%{transform:scale(0);}100%{transform:scale(1);}}
  .csuccess h2{font-family:var(--serif);font-size:25px;font-weight:300;margin-bottom:9px;}
  .csuccess p{font-size:13px;color:var(--text-2);line-height:1.6;}
  .cqr{text-align:center;padding:6px 24px 24px;}
  .cqr-box{width:130px;height:130px;background:var(--bg-card);border:1px solid var(--border);border-radius:6px;margin:0 auto 14px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:7px;font-size:12px;color:var(--text-3);}
  .cqr p{font-size:12px;color:var(--text-2);}

  /* ---------- account ---------- */
  .sphead{text-align:center;padding:18px 24px 26px;background:linear-gradient(to bottom,#efe9e0,var(--bg));}
  .savatar{width:70px;height:70px;border-radius:50%;background:var(--accent);margin:0 auto 14px;display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:27px;color:#fff;}
  .sphead h2{font-family:var(--serif);font-size:23px;margin-bottom:5px;}
  .slevel{display:inline-flex;align-items:center;gap:5px;font-size:11px;color:var(--gold);letter-spacing:2px;border:1px solid var(--gold);padding:3px 12px;border-radius:20px;}
  .card-h{padding:16px 18px 6px;display:flex;justify-content:space-between;align-items:baseline;}
  .card-h .t{font-family:var(--serif);font-size:17px;font-weight:600;}
  .card-h .m{font-size:12px;color:var(--accent);cursor:pointer;}
  .pill{font-size:10px;padding:2px 9px;border-radius:20px;letter-spacing:.5px;white-space:nowrap;}
  .pill-amber{background:#f7efe1;color:var(--amber);}
  .pill-blue{background:#eaf0f5;color:var(--blue);}
  .pill-green{background:var(--green-soft);color:var(--green);}
  .pill-gold{background:#f6eed8;color:var(--gold);}
  .pill-muted{background:var(--border-2);color:var(--text-3);}

  .menu{padding:6px 24px;}
  .mitem{display:flex;align-items:center;justify-content:space-between;padding:15px 0;border-bottom:1px solid var(--border-2);cursor:pointer;font-size:14px;}
  .mitem:active{opacity:.6;}
  .mleft{display:flex;align-items:center;gap:12px;}

function calCells(b){

  for(let d=1;d<=31;d++){

    if(full.includes(d)){html+=`<div class="cd full">${d}</div>`;continue;}
    html+=`<div class="cd ${b.date===d?'sel':''}" onclick="pickDate(${d})">${d}</div>`;
  }
  return html;
}

/* ============================ NAV ENGINE ============================ */
const screenEl=document.getElementById('screen');
let stack=[{view:'home',params:{}}];

function paint(dir){
  const top=stack[stack.length-1];
  const v=document.createElement('div');
  v.className='view '+(dir==='back'?'from-left':dir==='fade'?'fade':'from-right');
  v.innerHTML=VIEWS[top.view](top.params);
  const old=screenEl.querySelector('.view');
  screenEl.appendChild(v);
  void v.offsetWidth;
  v.classList.remove('from-left','from-right','fade');
  if(old){
    old.classList.add(dir==='back'?'to-right':dir==='fade'?'fade':'to-left');
    const o=old;
    o.addEventListener('transitionend',()=>o.remove(),{once:true});
    setTimeout(()=>{if(o.parentElement)o.remove();},600);
  }
}
function refresh(){
  const top=stack[stack.length-1];
  const v=screenEl.querySelector('.view:last-child');
  if(!v)return;
  const sc=v.querySelector('.scroll');
  const pos=sc?sc.scrollTop:0;
  v.innerHTML=VIEWS[top.view](top.params);
  const ns=v.querySelector('.scroll');
  if(ns)ns.scrollTop=pos;
}
function navigate(view,params){stack.push({view,params:params||{}});paint('forward');}
function back(){if(stack.length>1){stack.pop();paint('back');}}
function switchTab(view){stack=[{view,params:{}}];paint('fade');}
function goRoot(view){stack=[{view,params:{}}];paint('fade');}

/* ============================ ACTIONS ============================ */
function setCat(c){state.cat=c;refresh();}
function pickDate(d){state.booking.date=d;refresh();}
function pickTime(t){state.booking.time=t;refresh();}
function setField(k,v){state.booking[k]=v;}

function startBooking(pid){
  state.booking={projectId:pid,step:1,date:8,time:'11:00',name:'',phone:'',passport:'',referrer:'',errors:{}};
  navigate('booking',{});
}
function bookingGo(step){state.booking.step=step;state.booking.errors={};refresh();}
function bookingNext(){
  const b=state.booking;
  if(b.step===1){
    if(!b.date||!b.time){toast('请先选择日期和时段');return;}
    b.step=2;b.errors={};refresh();
  } else if(b.step===2){
    const e={};
    if(!b.name.trim()) e.name='请填写姓名';
    if(!/^\d{8,}$/.test(b.phone.replace(/\D/g,''))) e.phone='请填写有效手机号';
    b.errors=e;
    if(Object.keys(e).length){refresh();return;}
    b.step=3;refresh();
  }
}
function submitBooking(){
  const b=state.booking,p=project(b.projectId),h=hospital(p.hid);
  const code='GL2607-'+(900+state.myBookings.length);
  const rec={id:code,projId:p.id,proj:p.name,hosp:h.name,region:h.city,
    date:`2026 年 7 月 ${b.date} 日`,time:b.time,status:'待确认',price:checkoutText(p),
    name:b.name,phone:b.phone,referrer:b.referrer};
  state.myBookings.unshift(rec);
  state.lastBooking=rec;
  const notifyPayload={...rec,price:p.isFree?'免费体验':rec.price};
  fetch('/api/notify-feishu',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(notifyPayload)}).catch(()=>{});
  navigate('confirm',{});
}
function consult(name){
  document.getElementById('m-title').textContent='在线咨询';
  document.getElementById('m-text').textContent=`提交后可继续确认「${name}」的项目资料与预约信息。`;
  document.getElementById('modal').classList.add('show');
}

/* ============================ MODAL / TOAST ============================ */
function hideModal(){document.getElementById('modal').classList.remove('show');}
let toastT;
function toast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),1900);
}

/* ============================ INIT ============================ */
paint('fade');
